<!doctype html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8" />
    <!-- HTML 每次重新驗證,避免 deploy 後瀏覽器/CDN 快取舊 index.html 指向已不存在的 JS hash 造成登入畫面卡住(hashed JS 本身仍可長快取) -->
    <meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#1a1612" />
    <link rel="stylesheet" href="/style.css">
    <!-- REBOOT v4 專用字體:Noto Serif TC(標題)+ Noto Sans TC(內文),Google Fonts 免費 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=Noto+Serif+TC:wght@700;900&display=swap" rel="stylesheet">
    <title>破爛史詩 — Trash Epic</title>
</head>

<body>
    <div id="app">
        <div id="game-container"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
